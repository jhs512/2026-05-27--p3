<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - 커뮤니티 게시판">커뮤니티 게시판</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
    <style>
        :root {
            font-family: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-base-200">
<header class="navbar bg-base-100 shadow px-4">
    <div class="flex-1">
        <a href="/" class="btn btn-ghost text-xl">커뮤니티</a>
        <a href="/posts" class="btn btn-ghost">글 목록</a>
    </div>
    <div class="flex-none gap-2">
        <span sec:authorize="isAuthenticated()" class="text-sm">
            <span sec:authentication="principal.nickname">닉네임</span>님
        </span>
        <a sec:authorize="isAuthenticated()" href="/member/me" class="btn btn-ghost btn-sm">내 정보</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/member/logout}" method="post" class="inline">
            <button type="submit" class="btn btn-ghost btn-sm">로그아웃</button>
        </form>
        <a sec:authorize="isAnonymous()" href="/member/login" class="btn btn-ghost btn-sm">로그인</a>
        <a sec:authorize="isAnonymous()" href="/member/join" class="btn btn-primary btn-sm">회원가입</a>
    </div>
</header>

<main layout:fragment="content" class="container mx-auto max-w-3xl p-4">
    내용
</main>
</body>
</html>

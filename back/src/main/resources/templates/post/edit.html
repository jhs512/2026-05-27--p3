<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>글 수정</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title">글 수정</h2>
            <form th:action="@{'/posts/' + ${postId} + '/edit'}" th:object="${postForm}" method="post" class="space-y-3">
                <div class="form-control">
                    <label class="label"><span class="label-text">제목</span></label>
                    <input type="text" th:field="*{title}" class="input input-bordered w-full"/>
                    <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-error text-sm"></p>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">내용</span></label>
                    <textarea th:field="*{content}" rows="10" class="textarea textarea-bordered w-full"></textarea>
                    <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="text-error text-sm"></p>
                </div>
                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary">수정</button>
                    <a th:href="@{'/posts/' + ${postId}}" class="btn btn-ghost">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

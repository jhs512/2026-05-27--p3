<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/layout}">
<head>
    <title>글 목록</title>
</head>
<body>
<div layout:fragment="content">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">글 목록</h1>
        <a sec:authorize="isAuthenticated()" href="/posts/write" class="btn btn-primary btn-sm">글쓰기</a>
    </div>

    <div class="overflow-x-auto bg-base-100 rounded-box shadow">
        <table class="table">
            <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>조회</th>
                <th>작성일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="post : ${postPage.content}">
                <td th:text="${post.id}">1</td>
                <td>
                    <a th:if="${!post.deleted}" th:href="@{'/posts/' + ${post.id}}"
                       class="link link-hover" th:text="${post.title}">제목</a>
                    <span th:if="${post.deleted}" class="italic text-gray-400">삭제된 글</span>
                </td>
                <td th:text="${post.author.nickname}">작성자</td>
                <td th:text="${post.viewCount}">0</td>
                <td th:text="${#temporals.format(post.createDate, 'yyyy-MM-dd')}">날짜</td>
            </tr>
            <tr th:if="${postPage.totalElements == 0}">
                <td colspan="5" class="text-center text-gray-400 py-8">글이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="flex justify-center gap-1 mt-4" th:if="${postPage.totalPages > 1}">
        <a th:each="i : ${#numbers.sequence(0, postPage.totalPages - 1)}"
           th:href="@{/posts(page=${i})}"
           class="btn btn-sm"
           th:classappend="${i == postPage.number} ? 'btn-active' : ''"
           th:text="${i + 1}">1</a>
    </div>
</div>
</body>
</html>

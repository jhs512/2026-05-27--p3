<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>로그인</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title">로그인</h2>

            <div th:if="${param.error}" class="alert alert-error">
                <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <span>로그아웃되었습니다.</span>
            </div>

            <form th:action="@{/member/login}" method="post" class="space-y-3">
                <div class="form-control">
                    <label class="label"><span class="label-text">아이디(username)</span></label>
                    <input type="text" name="username" class="input input-bordered w-full"/>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">비밀번호</span></label>
                    <input type="password" name="password" class="input input-bordered w-full"/>
                </div>
                <button type="submit" class="btn btn-primary w-full">로그인</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>회원가입</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title">회원가입</h2>

            <form th:action="@{/member/join}" th:object="${joinForm}" method="post" class="space-y-3">
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-error">
                    <span th:each="err : ${#fields.globalErrors()}" th:text="${err}">에러</span>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">아이디(username)</span></label>
                    <input type="text" th:field="*{username}" class="input input-bordered w-full"/>
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-error text-sm"></p>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">비밀번호</span></label>
                    <input type="password" th:field="*{password}" class="input input-bordered w-full"/>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-error text-sm"></p>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">닉네임</span></label>
                    <input type="text" th:field="*{nickname}" class="input input-bordered w-full"/>
                    <p th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}" class="text-error text-sm"></p>
                </div>
                <button type="submit" class="btn btn-primary w-full">가입</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
